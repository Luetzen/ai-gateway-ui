# =============================================================================
# CI Workflow — ai-gateway-ui
# =============================================================================
# Runs type-checking and build on every push and pull request.
#
# Triggers:
#   - Push to any branch
#   - Pull requests targeting main
#
# Ignores changes to documentation-only files.
# =============================================================================

name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - "LICENSE"
      - ".gitignore"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
